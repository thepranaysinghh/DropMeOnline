<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DropMeOnline</title>
    <style>
        /* Basic reset and layout */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #333;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #666;
            margin-bottom: 24px;
        }

        /* Input field */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 16px;
        }

        /* Button */
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <h1>DropMeOnline</h1>
    <p>AI-powered social media strategist</p>

    <!-- Goal input -->
    <input type="text" id="goal" placeholder="Enter your goal (e.g. Grow AI niche for 30 days)" />

    <!-- Generate button -->
    <button onclick="alert('Coming soon...')">Generate Strategy</button>

</body>
</html>
